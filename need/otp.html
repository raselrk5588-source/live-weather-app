<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভেরিফিকেশন - মুসলিম বাংলা</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1b5e20;
            --primary-light: #4caf50;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #2e3d33;
            --gray: #757575;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .otp-card {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #e8f5e9;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: var(--primary);
        }

        h2 {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        p {
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #eee;
            background: #fafafa;
            font-size: 24px;
            text-align: center;
            letter-spacing: 10px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary-light);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 8px 20px rgba(27, 94, 32, 0.2);
            transition: 0.3s;
        }

        button:active {
            transform: scale(0.98);
        }

        .resend {
            margin-top: 20px;
            font-size: 13px;
            color: var(--gray);
        }

        .resend a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
        }

        @media (min-width: 768px) {
            body { max-width: 500px; margin: 0 auto; border-left: 1px solid #ddd; border-right: 1px solid #ddd; }
        }
    </style>
</head>
<body>

    <div class="otp-card">
        <div class="icon-circle">📲</div>
        <h2>কোড দিন</h2>
        <p>আপনার মোবাইলে পাঠানো ৪ ডিজিটের পিন কোডটি লিখুন</p>

        <input type="text" id="otp" maxlength="6" placeholder="----">

        <button onclick="verifyOtp()">ভেরিফাই করুন</button>

        <div class="resend">
            কোড পাননি? <a href="login.html">আবার চেষ্টা করুন</a>
        </div>
    </div>

    <script>
        async function verifyOtp() {
            const otp = document.getElementById("otp").value;
            const phone = localStorage.getItem("phone");
            const ref = localStorage.getItem("ref");

            if (!otp) {
                alert("পিন কোডটি দিন");
                return;
            }

            try {
                const res = await fetch("https://infopocket.unexsoft.xyz/verify_otp.php", {
                    method: "POST",
                    body: new URLSearchParams({
                        Otp: otp,
                        referenceNo: ref,
                        user_mobile: phone
                    })
                });

                const data = await res.json();

                if (data.statusCode === "S1000") {
                    localStorage.setItem("isLoggedIn", "true");
                    
                    const destination = localStorage.getItem("redirect_after_login") || "home.html";
                    localStorage.removeItem("redirect_after_login");
                    window.location.href = destination;
                } else {
                    alert(data.message || "ভুল কোড দিয়েছেন। পুনরায় চেষ্টা করুন।");
                }
            } catch (e) {
                alert("নেটওয়ার্ক সমস্যা");
            }
        }
    </script>
</body>
</html>
